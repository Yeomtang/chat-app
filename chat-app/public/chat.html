<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>익명 채팅</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f2f2f7;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 입장 화면 ── */
    #entrance {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 32px 24px;
      background: #ffffff;
    }

    #entrance h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 6px;
      text-align: center;
    }

    #entrance p {
      font-size: 14px;
      color: #8e8e93;
      margin-bottom: 40px;
      text-align: center;
      line-height: 1.5;
    }

    .nickname-card {
      width: 100%;
      background: #f2f2f7;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .nickname-label {
      font-size: 12px;
      color: #8e8e93;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
      width: 100%;
      text-align: center;
    }

    #nickname-display {
      font-size: 20px;
      font-weight: 700;
      color: #1c1c1e;
      line-height: 1.3;
      width: 100%;
      text-align: center;
    }

    .btn-reroll {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: none;
      border: 1.5px solid #d1d1d6;
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 14px;
      color: #3a3a3c;
      cursor: pointer;
      margin: 0 auto 32px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-reroll:active { background: #e5e5ea; }

    .btn-enter {
      width: 100%;
      background: #1c1c1e;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-enter:active { opacity: 0.8; }

    /* ── 채팅 화면 ── */
    #chatroom {
      display: none;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    #chat-content {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      transition: filter 0.5s ease, opacity 0.5s ease;
    }

    #chat-content.blurred {
      filter: blur(16px);
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── 투표 오버레이 (관객 폰) ── */
    #voting-overlay {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      gap: 18px;
      z-index: 30;
    }

    #voting-timer-phone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1c1c1e;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    #voting-question-phone {
      font-size: 19px;
      font-weight: 700;
      color: #1c1c1e;
      text-align: center;
      line-height: 1.4;
      max-width: 320px;
    }

    #voting-buttons {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .vote-btn {
      flex: 1;
      padding: 22px 0;
      border-radius: 18px;
      border: 3px solid transparent;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, opacity 0.15s, background 0.15s, color 0.15s;
    }

    .vote-btn:active { transform: scale(0.96); }
    .vote-btn:disabled { opacity: 0.45; cursor: default; }

    #vote-yes-btn { background: #e9f9ed; color: #1e8a3c; }
    #vote-yes-btn.selected { background: #34c759; color: #fff; border-color: #1e8a3c; }

    #vote-no-btn { background: #ffebe9; color: #c62b20; }
    #vote-no-btn.selected { background: #ff3b30; color: #fff; border-color: #c62b20; }

    #voting-ratio {
      width: 100%;
      max-width: 320px;
    }

    .ratio-bar {
      width: 100%;
      height: 10px;
      border-radius: 6px;
      background: #ffebe9;
      display: flex;
      overflow: hidden;
      margin-bottom: 8px;
    }

    #ratio-fill-yes { height: 100%; background: #34c759; transition: width 0.3s ease; }
    #ratio-fill-no { height: 100%; background: #ff3b30; transition: width 0.3s ease; }

    .ratio-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
      color: #3a3a3c;
    }

    #chat-header {
      background: #ffffff;
      border-bottom: 1px solid #e5e5ea;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #chat-header .avatar {
      width: 32px;
      height: 32px;
      background: #1c1c1e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
    }

    #chat-header .header-info {
      flex: 1;
    }

    #chat-header .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #1c1c1e;
    }

    #chat-header .header-sub {
      font-size: 12px;
      color: #8e8e93;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    .msg-bubble {
      display: inline-flex;
      flex-direction: column;
      background: #e9e9eb;
      color: #1c1c1e;
      padding: 8px 14px 10px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      font-size: 15px;
      line-height: 1.4;
      max-width: 80%;
      word-break: break-word;
    }

    .msg-nickname {
      font-size: 11px;
      font-weight: 600;
      color: #8e8e93;
      margin-bottom: 2px;
    }

    .msg-text {
      color: #1c1c1e;
    }

    /* ── 입력창 ── */
    #input-area {
      background: #ffffff;
      border-top: 1px solid #e5e5ea;
      padding: 8px 12px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #f2f2f7;
      border: none;
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 15px;
      font-family: inherit;
      color: #1c1c1e;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }

    #msg-input::placeholder { color: #aeaeb2; }

    #send-btn {
      width: 34px;
      height: 34px;
      background: #1c1c1e;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.3; cursor: default; }

    #send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

<!-- 입장 화면 -->
<div id="entrance">
  <h1>오늘의 토론에 참여하세요</h1>
  <p>아래 닉네임으로 익명 채팅에 참여합니다.<br>마음에 들지 않으면 다시 뽑아보세요.</p>

  <div class="nickname-card">
    <div class="nickname-label">나의 닉네임</div>
    <div id="nickname-display">로딩 중...</div>
  </div>

  <button class="btn-reroll" onclick="rerollNickname()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    다른 닉네임 뽑기
  </button>

  <button class="btn-enter" onclick="enterChat()">이 닉네임으로 참여하기</button>
</div>

<!-- 채팅 화면 -->
<div id="chatroom">
  <div id="chat-content">
    <div id="chat-header">
      <div class="avatar" id="header-avatar">?</div>
      <div class="header-info">
        <div class="header-title" id="header-nickname"></div>
        <div class="header-sub">익명 토론 채팅</div>
      </div>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <textarea id="msg-input" placeholder="메시지 입력..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 투표 오버레이 -->
  <div id="voting-overlay">
    <div id="voting-timer-phone">30</div>
    <div id="voting-question-phone"></div>
    <div id="voting-buttons">
      <button class="vote-btn" id="vote-yes-btn" onclick="castVote('yes')">YES</button>
      <button class="vote-btn" id="vote-no-btn" onclick="castVote('no')">NO</button>
    </div>
    <div id="voting-ratio">
      <div class="ratio-bar">
        <div id="ratio-fill-yes" style="width:0%"></div>
        <div id="ratio-fill-no" style="width:0%"></div>
      </div>
      <div class="ratio-text">
        <span id="ratio-yes-pct">YES 0%</span>
        <span id="ratio-no-pct">NO 0%</span>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── 닉네임 풀 생성 (25 × 25 = 625개) ──
  const PREFIXES = [
    '야근하는', '퇴근못한', '커피없는', '월요일싫은', '점심기다리는',
    '회의중인', '보고서쓰는', '연차쓰고싶은', '상사눈치보는', '월급날기다리는',
    '카페인의존하는', '스트레스받는', '엑셀여는', '퇴사고민하는', '메신저피하는',
    '칼퇴원하는', '야식먹는', '재택원하는', '회식싫은', '마감쫓기는',
    '탕비실숨는', '화장실피신한', '창문바라보는', '점심혼밥하는', '복사실가는',
  ];
  const SUFFIXES = [
    '사원', '대리', '과장', '차장', '부장',
    '팀장', '인턴', '계약직', '신입', '3년차',
    '5년차', '10년차', '직장인', '사무직', '영업사원',
    '기획자', '디자이너', '개발자', '마케터', '경리',
    '총무', '프리랜서', '워커', '비서', '실장',
  ];

  let nicknamePool = [];
  let poolIndex = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function initNicknamePool() {
    const pool = [];
    for (const p of PREFIXES) {
      for (const s of SUFFIXES) {
        pool.push(`${p} ${s}`);
      }
    }
    nicknamePool = shuffle(pool);
    poolIndex = 0;
  }

  function getNewNickname() {
    if (nicknamePool.length === 0 || poolIndex >= nicknamePool.length) {
      initNicknamePool();
    }
    return nicknamePool[poolIndex++];
  }

  let currentNickname = '';
  let socket;
  let nickSocket;

  // ── 영구 클라이언트 ID (localStorage) — 투표 중복 방지 키 ──
  function getClientId() {
    let id = localStorage.getItem('ledClientId');
    if (!id) {
      id = 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2);
      localStorage.setItem('ledClientId', id);
    }
    return id;
  }
  const clientId = getClientId();

  function requestNickname() {
    currentNickname = getNewNickname();
    document.getElementById('nickname-display').textContent = currentNickname;

    if (!nickSocket) {
      nickSocket = io();
      // 연결 완료 후 identify 전송
      nickSocket.on('connect', () => {
        nickSocket.emit('identify', clientId);
      });
      // 이전 메시지 수신
      nickSocket.on('history', (messages) => {
        document.getElementById('messages').innerHTML = ''; // 재연결 시 중복 방지
        messages.forEach(addMessage);
        scrollToBottom();
      });
      // 새 메시지 수신
      nickSocket.on('chat', (msg) => {
        addMessage(msg);
        scrollToBottom();
      });
      // 투표 상태 동기화는 입장 전에도 받아야 함 (연결 즉시 시작)
      nickSocket.on('state', applyVoteState);
      nickSocket.on('modeChange', applyVoteState);
      nickSocket.on('voteUpdate', (data) => updateRatio(data.counts));
    }
  }

  // ══════════════════════════════════
  //  투표 모드 (관객 폰)
  // ══════════════════════════════════
  let currentMode = 'chat';
  let myVote = null;
  let phoneTimerInterval = null;
  let phoneVotingEndTime = null;

  function applyVoteState(state) {
    currentMode = state.mode;
    const overlay = document.getElementById('voting-overlay');
    const chatContent = document.getElementById('chat-content');

    if (state.mode === 'chat') {
      overlay.style.display = 'none';
      chatContent.classList.remove('blurred');
      myVote = null;
      stopPhoneTimer();
      updateVoteUI();
      return;
    }

    chatContent.classList.add('blurred');
    overlay.style.display = 'flex';
    myVote = state.myVote || myVote;

    const questionEl = document.getElementById('voting-question-phone');
    const timerEl = document.getElementById('voting-timer-phone');
    const buttonsEl = document.getElementById('voting-buttons');

    if (state.mode === 'voting') {
      questionEl.style.display = 'block';
      timerEl.style.display = 'inline-flex';
      buttonsEl.style.display = 'flex';
      questionEl.textContent = state.question || '';
      startPhoneTimer(state.votingEndTime);
    } else if (state.mode === 'result') {
      questionEl.style.display = 'none';
      timerEl.style.display = 'none';
      stopPhoneTimer();
    }

    updateVoteUI();
    updateRatio(state.counts);
  }

  function updateVoteUI() {
    const yesBtn = document.getElementById('vote-yes-btn');
    const noBtn = document.getElementById('vote-no-btn');
    yesBtn.classList.toggle('selected', myVote === 'yes');
    noBtn.classList.toggle('selected', myVote === 'no');
    yesBtn.disabled = currentMode !== 'voting';
    noBtn.disabled = currentMode !== 'voting';
  }

  function updateRatio(counts) {
    const c = counts || { yes: 0, no: 0, total: 0 };
    const yesPct = c.total ? Math.round((c.yes / c.total) * 100) : 0;
    const noPct = 100 - yesPct;
    document.getElementById('ratio-fill-yes').style.width = (c.total ? yesPct : 0) + '%';
    document.getElementById('ratio-fill-no').style.width = (c.total ? noPct : 0) + '%';
    document.getElementById('ratio-yes-pct').textContent = `YES ${yesPct}%`;
    document.getElementById('ratio-no-pct').textContent = `NO ${noPct}%`;
  }

  function startPhoneTimer(endTime) {
    phoneVotingEndTime = endTime;
    if (phoneTimerInterval) clearInterval(phoneTimerInterval);
    phoneTimerInterval = setInterval(updatePhoneTimerDisplay, 200);
    updatePhoneTimerDisplay();
  }

  function stopPhoneTimer() {
    if (phoneTimerInterval) clearInterval(phoneTimerInterval);
    phoneTimerInterval = null;
  }

  function updatePhoneTimerDisplay() {
    if (!phoneVotingEndTime) return;
    const remain = Math.max(0, Math.ceil((phoneVotingEndTime - Date.now()) / 1000));
    document.getElementById('voting-timer-phone').textContent = remain;
  }

  function castVote(choice) {
    if (currentMode !== 'voting' || !nickSocket) return;
    myVote = choice;
    updateVoteUI();
    nickSocket.emit('vote', { choice });
  }

  function rerollNickname() {
    requestNickname();
  }

  function enterChat() {
    if (!currentNickname) return;

    // 닉네임 요청에 쓰던 소켓을 채팅에 재사용
    socket = nickSocket;

    // UI 전환
    document.getElementById('entrance').style.display = 'none';
    const chatroom = document.getElementById('chatroom');
    chatroom.style.display = 'flex';

    const initial = currentNickname.charAt(0);
    document.getElementById('header-avatar').textContent = initial;
    document.getElementById('header-nickname').textContent = currentNickname;
  }

  function addMessage(msg) {
    const messages = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const nick = document.createElement('div');
    nick.className = 'msg-nickname';
    nick.textContent = msg.nickname;

    const text = document.createElement('div');
    text.className = 'msg-text';
    text.textContent = msg.text;

    bubble.appendChild(nick);
    bubble.appendChild(text);
    group.appendChild(bubble);
    messages.appendChild(group);
  }

  function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !socket) return;

    socket.emit('chat', { nickname: currentNickname, text });
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
  }

  // 입력창 auto-resize + 전송 버튼 활성화
  document.addEventListener('DOMContentLoaded', () => {
    requestNickname(); // 페이지 로드 시 서버에서 첫 닉네임 배정

    const input = document.getElementById('msg-input');
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
      document.getElementById('send-btn').disabled = input.value.trim() === '';
    });

    input.addEventListener('keydown', (e) => {
      if (e.isComposing) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  });
</script>
</body>
</html>
