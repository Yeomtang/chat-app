<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED 채팅 화면</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 2:3 비율 컨테이너 */
    #screen {
      width: min(100vw, calc(100vh * 2 / 3));
      height: min(100vh, calc(100vw * 3 / 2));
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }

    /* 채팅 레이어 (블러 대상) */
    #chat-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: filter 0.5s ease, opacity 0.5s ease;
    }

    #chat-layer.blurred {
      filter: blur(16px);
      opacity: 0.5;
    }

    /* 상단 헤더 */
    #led-header {
      padding: 28px 28px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #f2f2f7;
    }

    #led-header .title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 메시지 영역 */
    #led-messages {
      flex: 1;
      overflow: hidden;
      padding: 16px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0;
      position: relative;
    }

    /* 상단 페이드 그라디언트 */
    #led-messages::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, #ffffff, transparent);
      z-index: 10;
      pointer-events: none;
    }

    .led-msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .led-bubble {
      display: inline-flex;
      flex-direction: column;
      background: #f2f2f7;
      padding: 10px 16px 13px;
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      max-width: 88%;
      word-break: break-word;
    }

    .led-nickname {
      font-size: 11px;
      font-weight: 600;
      color: #aeaeb2;
      margin-bottom: 3px;
      letter-spacing: 0.2px;
    }

    .led-text {
      font-size: 17px;
      font-weight: 400;
      color: #1c1c1e;
      line-height: 1.45;
    }

    /* 하단 입력 표시 영역 (장식용) */
    #led-footer {
      padding: 12px 28px 20px;
      border-top: 1px solid #f2f2f7;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-bar {
      flex: 1;
      height: 38px;
      background: #f2f2f7;
      border-radius: 19px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
    }

    .footer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c7c7cc;
      animation: blink 1.4s infinite;
    }

    .footer-dot:nth-child(2) { animation-delay: 0.2s; }
    .footer-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    .footer-text {
      font-size: 13px;
      color: #c7c7cc;
    }

    .footer-send {
      width: 36px;
      height: 36px;
      background: #e9e9eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 투표 오버레이 레이어 ── */
    #voting-layer {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      z-index: 20;
    }

    #voting-layer.active { display: flex; }

    #voting-question-wrap {
      padding: 40px 28px 0;
      text-align: center;
      flex-shrink: 0;
    }

    #voting-timer {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #1c1c1e;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    #voting-question {
      font-size: 22px;
      font-weight: 700;
      color: #1c1c1e;
      line-height: 1.4;
    }

    #voting-canvas-wrap {
      flex: 1;
      width: 100%;
      position: relative;
    }

    #voting-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #result-banner {
      display: none;
      padding: 0 28px 48px;
      text-align: center;
      flex-shrink: 0;
    }

    #result-banner.active { display: block; }

    #result-banner .result-line {
      font-size: 17px;
      color: #8e8e93;
      font-weight: 600;
    }

    #result-banner .result-pct {
      font-size: 15px;
      color: #1c1c1e;
      font-weight: 700;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="screen">
  <div id="chat-layer">
    <div id="led-header">
      <div class="title">Live Chat</div>
    </div>

    <div id="led-messages"></div>

    <div id="led-footer">
      <div class="footer-bar">
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
        <div class="footer-text">실시간 익명 채팅</div>
      </div>
      <div class="footer-send">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- 투표 오버레이 -->
  <div id="voting-layer">
    <div id="voting-question-wrap">
      <div id="voting-timer">30</div>
      <div id="voting-question"></div>
    </div>
    <div id="voting-canvas-wrap">
      <canvas id="voting-canvas"></canvas>
    </div>
    <div id="result-banner">
      <div class="result-line" id="result-line">YES 00% · NO 00%</div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const MAX_VISIBLE = 8; // LED에 보여줄 최대 메시지 수
  const messages = [];

  const container = document.getElementById('led-messages');
  const socket = io();

  socket.on('history', (history) => {
    const recent = history.slice(-MAX_VISIBLE);
    recent.forEach(addMessage);
  });

  socket.on('chat', (msg) => {
    addMessage(msg);
  });

  function addMessage(msg) {
    messages.push(msg);

    const group = document.createElement('div');
    group.className = 'led-msg-group';

    const bubble = document.createElement('div');
    bubble.className = 'led-bubble';

    const nick = document.createElement('div');
    nick.className = 'led-nickname';
    nick.textContent = msg.nickname;

    const text = document.createElement('div');
    text.className = 'led-text';
    text.textContent = msg.text;

    bubble.appendChild(nick);
    bubble.appendChild(text);
    group.appendChild(bubble);
    container.appendChild(group);

    // 최대 개수 초과 시 가장 오래된 것 제거
    const groups = container.querySelectorAll('.led-msg-group');
    if (groups.length > MAX_VISIBLE) {
      groups[0].remove();
    }
  }

  // ══════════════════════════════════
  //  투표 모드
  // ══════════════════════════════════
  const chatLayer = document.getElementById('chat-layer');
  const votingLayer = document.getElementById('voting-layer');
  const votingQuestion = document.getElementById('voting-question');
  const votingTimer = document.getElementById('voting-timer');
  const resultBanner = document.getElementById('result-banner');
  const resultLine = document.getElementById('result-line');

  const canvas = document.getElementById('voting-canvas');
  const ctx = canvas.getContext('2d');

  const COLOR_YES = '#34c759';
  const COLOR_NO = '#ff3b30';
  const BALL_SCALE = 1.5; // 공/레이블 크기 배율

  let particles = new Map(); // clientId -> { side, x, y, tx, ty, r, phase }
  let votingEndTime = null;
  let timerInterval = null;
  let rafHandle = null;
  let currentMode = 'chat';

  function resizeCanvas() {
    const wrap = document.getElementById('voting-canvas-wrap');
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }
  window.addEventListener('resize', resizeCanvas);

  function clusterCenter(side) {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    return side === 'yes'
      ? { x: w * 0.27, y: h * 0.5 }
      : { x: w * 0.73, y: h * 0.5 };
  }

  // 클러스터 내 위치 재배치 (sunflower 패킹)
  function repack(side) {
    const ids = [...particles.entries()].filter(([, p]) => p.side === side).map(([id]) => id);
    const center = clusterCenter(side);
    const n = ids.length;
    if (n === 0) return;
    const packRadius = Math.min((14 * BALL_SCALE) * Math.sqrt(n) + (10 * BALL_SCALE), Math.min(canvas.width, canvas.height) / devicePixelRatio * (0.32 * BALL_SCALE));
    const golden = Math.PI * (3 - Math.sqrt(5));
    ids.forEach((id, i) => {
      const r = packRadius * Math.sqrt((i + 0.5) / n);
      const theta = i * golden;
      const p = particles.get(id);
      p.tx = center.x + r * Math.cos(theta);
      p.ty = center.y + r * Math.sin(theta);
    });
  }

  function setVote(clientId, side) {
    if (!particles.has(clientId)) {
      const center = clusterCenter(side);
      particles.set(clientId, {
        side, x: center.x, y: center.y, tx: center.x, ty: center.y,
        r: 7 * BALL_SCALE, phase: Math.random() * Math.PI * 2,
      });
    } else {
      particles.get(clientId).side = side;
    }
    repack('yes');
    repack('no');
  }

  function syncVotesFromState(votesObj) {
    particles.clear();
    Object.entries(votesObj || {}).forEach(([clientId, side]) => {
      const center = clusterCenter(side);
      particles.set(clientId, {
        side, x: center.x, y: center.y, tx: center.x, ty: center.y,
        r: 7 * BALL_SCALE, phase: Math.random() * Math.PI * 2,
      });
    });
    repack('yes');
    repack('no');
  }

  function drawFrame(time) {
    ctx.save();
    ctx.scale(devicePixelRatio, devicePixelRatio);
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    ctx.clearRect(0, 0, w, h);

    // 클러스터 레이블
    const yc = clusterCenter('yes');
    const nc = clusterCenter('no');
    ctx.font = `700 ${Math.round(15 * BALL_SCALE)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = COLOR_YES;
    ctx.fillText('YES', yc.x, h * 0.5 - 110 * BALL_SCALE);
    ctx.fillStyle = COLOR_NO;
    ctx.fillText('NO', nc.x, h * 0.5 - 110 * BALL_SCALE);

    particles.forEach((p) => {
      p.x += (p.tx - p.x) * 0.12;
      p.y += (p.ty - p.y) * 0.12;
      const jitterX = Math.sin(time / 600 + p.phase) * 2;
      const jitterY = Math.cos(time / 700 + p.phase) * 2;

      ctx.beginPath();
      ctx.arc(p.x + jitterX, p.y + jitterY, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.side === 'yes' ? COLOR_YES : COLOR_NO;
      ctx.globalAlpha = 0.85;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    ctx.restore();
    rafHandle = requestAnimationFrame(drawFrame);
  }

  function startRenderLoop() {
    if (rafHandle) cancelAnimationFrame(rafHandle);
    resizeCanvas();
    rafHandle = requestAnimationFrame(drawFrame);
  }

  function stopRenderLoop() {
    if (rafHandle) cancelAnimationFrame(rafHandle);
    rafHandle = null;
  }

  function updateTimerDisplay() {
    if (!votingEndTime) return;
    const remain = Math.max(0, Math.ceil((votingEndTime - Date.now()) / 1000));
    votingTimer.textContent = remain;
  }

  function applyState(state) {
    currentMode = state.mode;

    if (state.mode === 'chat') {
      chatLayer.classList.remove('blurred');
      votingLayer.classList.remove('active');
      resultBanner.classList.remove('active');
      stopRenderLoop();
      if (timerInterval) clearInterval(timerInterval);
      return;
    }

    // voting 또는 result
    chatLayer.classList.add('blurred');
    votingLayer.classList.add('active');
    votingQuestion.textContent = state.question || '';
    syncVotesFromState(state.votes);
    startRenderLoop();

    if (state.mode === 'voting') {
      resultBanner.classList.remove('active');
      votingTimer.style.display = 'inline-flex';
      votingQuestion.style.display = 'block';
      votingEndTime = state.votingEndTime;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimerDisplay, 200);
      updateTimerDisplay();
    } else if (state.mode === 'result') {
      // 질문/타이머 텍스트 숨기고 결과만 floating
      if (timerInterval) clearInterval(timerInterval);
      votingTimer.style.display = 'none';
      votingQuestion.style.display = 'none';
      const c = state.counts || { yes: 0, no: 0, total: 0 };
      const yesPct = c.total ? Math.round((c.yes / c.total) * 100) : 0;
      const noPct = 100 - yesPct;
      resultLine.textContent = `YES ${yesPct}%  ·  NO ${noPct}%`;
      resultBanner.classList.add('active');
    }
  }

  socket.on('state', applyState);
  socket.on('modeChange', applyState);

  socket.on('voteUpdate', (data) => {
    if (currentMode !== 'voting') return;
    setVote(data.clientId, data.choice);
  });

  socket.emit('identify', 'led-screen-' + Math.random().toString(36).slice(2));
</script>
</body>
</html>
