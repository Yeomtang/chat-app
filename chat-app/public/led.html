<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED 채팅 화면</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 2:3 비율 컨테이너 */
    #screen {
      width: min(100vw, calc(100vh * 2 / 3));
      height: min(100vh, calc(100vw * 3 / 2));
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* 상단 헤더 */
    #led-header {
      padding: 28px 28px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #f2f2f7;
    }

    #led-header .title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 메시지 영역 */
    #led-messages {
      flex: 1;
      overflow: hidden;
      padding: 16px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0;
      position: relative;
    }

    /* 상단 페이드 그라디언트 */
    #led-messages::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, #ffffff, transparent);
      z-index: 10;
      pointer-events: none;
    }

    .led-msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .led-bubble {
      display: inline-flex;
      flex-direction: column;
      background: #f2f2f7;
      padding: 10px 16px 13px;
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      max-width: 88%;
      word-break: break-word;
    }

    .led-nickname {
      font-size: 11px;
      font-weight: 600;
      color: #aeaeb2;
      margin-bottom: 3px;
      letter-spacing: 0.2px;
    }

    .led-text {
      font-size: 17px;
      font-weight: 400;
      color: #1c1c1e;
      line-height: 1.45;
    }

    /* 하단 입력 표시 영역 (장식용) */
    #led-footer {
      padding: 12px 28px 20px;
      border-top: 1px solid #f2f2f7;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-bar {
      flex: 1;
      height: 38px;
      background: #f2f2f7;
      border-radius: 19px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
    }

    .footer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c7c7cc;
      animation: blink 1.4s infinite;
    }

    .footer-dot:nth-child(2) { animation-delay: 0.2s; }
    .footer-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    .footer-text {
      font-size: 13px;
      color: #c7c7cc;
    }

    .footer-send {
      width: 36px;
      height: 36px;
      background: #e9e9eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div id="screen">
  <div id="led-header">
    <div class="title">Live Chat</div>
  </div>

  <div id="led-messages"></div>

  <div id="led-footer">
    <div class="footer-bar">
      <div class="footer-dot"></div>
      <div class="footer-dot"></div>
      <div class="footer-dot"></div>
      <div class="footer-text">실시간 익명 채팅</div>
    </div>
    <div class="footer-send">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const MAX_VISIBLE = 8; // LED에 보여줄 최대 메시지 수
  const messages = [];

  const container = document.getElementById('led-messages');
  const socket = io();

  socket.on('history', (history) => {
    const recent = history.slice(-MAX_VISIBLE);
    recent.forEach(addMessage);
  });

  socket.on('chat', (msg) => {
    addMessage(msg);
  });

  function addMessage(msg) {
    messages.push(msg);

    const group = document.createElement('div');
    group.className = 'led-msg-group';

    const bubble = document.createElement('div');
    bubble.className = 'led-bubble';

    const nick = document.createElement('div');
    nick.className = 'led-nickname';
    nick.textContent = msg.nickname;

    const text = document.createElement('div');
    text.className = 'led-text';
    text.textContent = msg.text;

    bubble.appendChild(nick);
    bubble.appendChild(text);
    group.appendChild(bubble);
    container.appendChild(group);

    // 최대 개수 초과 시 가장 오래된 것 제거
    const groups = container.querySelectorAll('.led-msg-group');
    if (groups.length > MAX_VISIBLE) {
      groups[0].remove();
    }
  }
</script>
</body>
</html>
